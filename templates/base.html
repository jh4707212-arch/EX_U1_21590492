<!DOCTYPE html>
<html>
<head>
    <title>Blog de Noticias</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            margin:0;
        }

        header{
            background:#2c3e50;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            width:70%;
            margin:auto;
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:8px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            background:#3498db;
            color:white;
            border:none;
            padding:10px 15px;
            margin-top:10px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        .post{
            margin-top:20px;
            padding:10px;
            border-bottom:1px solid #ccc;
        }
    </style>
</head>

<body>

<header>
    <h1>Blog de Noticias</h1>
</header>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
